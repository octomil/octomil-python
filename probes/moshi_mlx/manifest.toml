# Slice 2B — Moshi/MLX viability probe — pinned manifest
#
# Source-of-truth pins for the probe's reproducibility. Every consumer
# (the probe script, the conformance test, the Slice 2C adapter) reads
# this file rather than hard-coding values inline.
#
# WHAT THE PROBE ACTUALLY VERIFIES TODAY (Codex R6 missed-case clarification):
#   - moshi-mlx package version (acceptance #1) — strict equality
#   - Per-file SHA-256 against AS-DECLARED or lock-file pin (acceptance #2)
#   - Capability mapping (acceptance #6) — local config check
#
# The fields below tagged "AS-DECLARED" with empty values (sdist_sha256,
# revision_locked, expected_total_bytes, MLX resolved_version) are NOT
# enforced at probe time today. They exist as targets for follow-up
# verification in Slice 2C's adapter PR — the probe scaffold establishes
# the schema; the adapter brings the cross-checks online when the dev-box
# operator runs it with weights staged.
#
# All hashes are SHA-256 unless noted. Empty-string values mean
# "verified at probe runtime, recorded back into manifest.lock.toml".
# The locking step keeps the AS-RUN values separate from the
# AS-DECLARED values so the next runner can detect upstream drift.

[probe]
name = "moshi-mlx-viability"
slice = "2B"
target = "macos-arm64"
# Acceptance gate from the strategy doc: probe is GREEN only if all
# six measurements come back within budget AND no ABI delta is needed.
# Budgets (Octomil v0.5 realtime SLOs, soft):
#   cold_open_ms          ≤ 8000   (first-load from disk; weights mmap)
#   warm_open_ms          ≤ 1500   (subsequent open within same process)
#   first_audio_ms        ≤ 1200   (oct_session_open → first AUDIO_CHUNK)
#   chunk_cadence_ms      80–160   (steady-state inter-chunk delta)
#   peak_rss_mb           ≤ 6000   (whole-process; on a 16GB Mac the
#                                   model + Mimi codec + cffi runtime
#                                   live alongside the Python harness)
#   gpu_active_pct        ≥ 30     (Metal active during synthesis;
#                                   falling below means CPU fallback)
#   cancel_to_silent_ms   ≤ 250    (cancel() → no further AUDIO_CHUNK)
# Codex R3 honesty fix: chunk_cadence_min/max and cancel_to_silent
# moved out of the GREEN gates. Without 80 ms wall-clock pacing of
# the encode loop, "inter-arrival cadence" is just compute-per-chunk
# (max throughput), and Python `del gen2` is not Moshi cancellation.
# The real-time-factor gate replaces both: avg_compute_per_chunk_ms
# / 80 ms must be < 1.0 to keep up with a microphone. Slice 2C
# brings real cadence + cancellation gates with the C++ adapter.
budgets = { cold_open_ms = 8000, warm_open_ms = 1500, first_audio_ms = 1200, real_time_factor_max = 1.0, peak_rss_mb = 6000, gpu_active_pct_min = 30 }

# -----------------------------------------------------------------------
# Upstream sources — pinned to commit + license + size + hash
# -----------------------------------------------------------------------

[upstream.kyutai_moshi]
description = "Kyutai-labs Moshi reference repository (MLX + PyTorch + Rust + Swift)."
repo = "https://github.com/kyutai-labs/moshi"
# AS-DECLARED tag corresponding to moshi-mlx==0.2.6 PyPI release.
# The probe does NOT clone or verify the upstream repo — it pins the
# PyPI package version (verified) and the on-disk weight hashes
# (verified per file via sha256). This `tag` field exists for the
# Slice 2C adapter PR to enforce when it builds liboctomil-runtime
# against the upstream sources directly. (Codex R8 honesty fix:
# previous `commit = "0a0f7e2"` was an invented short ref that
# claimed runtime verification the probe never performed.)
tag = "mlx-0.2.6"
license = "MIT (code) + CC-BY-4.0 (model weights)"
license_file = "LICENSE"

[upstream.moshi_mlx_pkg]
description = "moshi-mlx PyPI package — Apple-Silicon-optimized MLX path."
pypi = "moshi-mlx"
# AS-DECLARED. The probe reads `moshi_mlx.__version__` at startup
# and fails fast if it doesn't match.
version = "0.2.6"
# Source distribution sha256, captured by `pip download moshi-mlx==0.2.6 --no-deps`
# on the verifier host. Recorded into manifest.lock.toml.
sdist_sha256 = ""

[upstream.mlx_core]
description = "Apple MLX framework — required by moshi-mlx."
pypi = "mlx"
# moshi-mlx 0.2.6 hard-pins this range; we accept whatever the
# resolver picks within the band and RECORD the resolved value into
# the lock file. AS-DECLARED constraint is dictated by upstream.
version = ">=0.24,<0.25"
resolved_version = ""

# -----------------------------------------------------------------------
# Model artifacts — Moshiko (text+speech LM) + Mimi (audio codec)
# -----------------------------------------------------------------------

[artifacts.moshiko_mlx_q4]
description = "Moshiko 7B speech-aware LM, MLX 4-bit quantized — bundles LM weights + text tokenizer + Mimi audio tokenizer + LM config in a single HF repo."
huggingface_repo = "kyutai/moshiko-mlx-q4"
revision = "main"  # AS-DECLARED. Probe locks to commit-hash at runtime.
revision_locked = ""
license = "CC-BY-4.0"
expected_total_bytes = 0  # filled by lock step
# Codex R12 blocker fix: upstream `kyutai/moshiko-mlx-q4` bundles
# the Mimi tokenizer checkpoint inside the SAME repo as the LM
# weights — there is no separate `kyutai/mimi` artifact directory.
# Earlier draft split them; the split required two HF repos and the
# mimi/ subdir would have been empty after huggingface-cli download.
# Filenames mirror the canonical run_inference.main resolution:
#   - moshi weights:  config["moshi_name"]   (default model.q4.safetensors)
#   - mimi weights:   config["mimi_name"]    (a checkpoint .safetensors)
#   - tokenizer:      config["tokenizer_name"]
#   - lm config:      config.json            (may differ in newer revisions;
#                     operator updates manifest+lock if upstream renames)
# Codex R13 fix: config.json is NOT present in kyutai/moshiko-mlx-q4
# (live HF tree confirmed). The canonical run_inference.main fetches
# `config.json` via hf_hub_download but on this repo that fetch
# returns 404. Probe falls back to `moshi_mlx.models.config_v0_1()` —
# the same canonical Moshiko config exposed by the package itself.
# If the operator wants to override (custom build), they stage a
# `config.json` and re-run; the probe prefers it when present.
files = [
    { path = "model.q4.safetensors", role = "weights", sha256 = "" },
    { path = "tokenizer_spm_32k_3.model", role = "tokenizer", sha256 = "" },
    { path = "tokenizer-e351c8d8-checkpoint125.safetensors", role = "mimi_weights", sha256 = "" },
]

# -----------------------------------------------------------------------
# Audio I/O parameters (Moshi reference defaults)
# -----------------------------------------------------------------------

[audio]
input_sample_rate_hz = 24000
output_sample_rate_hz = 24000
mimi_frame_rate_hz = 12.5  # one Mimi frame = 80 ms of audio
mimi_codebooks = 8
input_channels = 1
output_channels = 1
sample_format = "PCM_F32LE"  # matches OCT_SAMPLE_FORMAT_PCM_F32LE

# -----------------------------------------------------------------------
# ABI mapping declaration — proves design-time sufficiency BEFORE the
# probe runs. If any row needs a new ABI field, the probe halts with
# OCT_STATUS_VERSION_MISMATCH-like exit code and the design is debated.
# -----------------------------------------------------------------------

[abi_mapping.session_open]
inputs = "oct_session_config_t.{model_uri, capability, locality, sample_rate_in, sample_rate_out, priority}"
outputs = "oct_session_t* + OCT_EVENT_SESSION_STARTED with engine=moshi-mlx, model_digest=sha256(model.safetensors), runtime_build_tag=octomil-runtime/<git-sha>"
delta_required = false

[abi_mapping.audio_chunk_event]
moshi_output = "Mimi-decoded float32 PCM, 24kHz mono, ~80ms-per-Mimi-frame"
abi_event = "OCT_EVENT_AUDIO_CHUNK { pcm, n_bytes, sample_rate=24000, sample_format=OCT_SAMPLE_FORMAT_PCM_F32LE, channels=1, is_final=0 }"
delta_required = false

[abi_mapping.transcript_chunk_event]
moshi_output = "Streaming text tokens from Moshi's text head"
abi_event = "OCT_EVENT_TRANSCRIPT_CHUNK { utf8, n_bytes }"
delta_required = false

[abi_mapping.cancel]
moshi_op = "Stop Mimi decoder + Moshi forward pass at next 80ms boundary"
abi_op = "oct_session_cancel → OCT_STATUS_OK; subsequent poll yields SESSION_COMPLETED with terminal_status=CANCELLED"
delta_required = false

[abi_mapping.input_dropped]
moshi_op = "Mimi encoder backpressure when input frames arrive faster than 12.5Hz"
abi_event = "OCT_EVENT_INPUT_DROPPED { n_frames_dropped, sample_rate=24000, channels=1, reason='engine_lagging', dropped_at_ns }"
delta_required = false

# -----------------------------------------------------------------------
# Fallback candidates — only consulted if probe goes RED.
# -----------------------------------------------------------------------

[fallback.moshi_rust_metal]
description = "Kyutai's Rust + Candle + Metal backend; same model weights, different runtime."
trigger = "MLX path fails or first_audio_ms > 5x budget"
ports_to_octomil = "Rust dylib linked into liboctomil-runtime via cxx; weights loader stays the same"
estimated_effort_weeks = 4

[fallback.moshi_pytorch_mps]
description = "PyTorch + Apple MPS backend, run via Python subprocess gateway."
trigger = "MLX OOMs at q4 OR mlx package unavailable on macOS-arm64 release"
ports_to_octomil = "Daemon-host (slice 3b) only — Layer 2a in-process invariant forbids torch on the audio thread"
estimated_effort_weeks = 6

[fallback.alternative_realtime_models]
description = "If Moshi itself proves unviable on Apple Silicon, alternative half-duplex realtime LMs."
candidates = ["llama.cpp + voice activity model", "OpenAI Whisper streaming + local TTS", "Sherpa-onnx streaming pipeline"]
trigger = "Moshi family unworkable; product needs to redefine 'realtime' for a non-Moshi architecture"
estimated_effort_weeks = 12
