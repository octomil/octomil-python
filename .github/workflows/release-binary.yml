name: Release Binary

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build binaries for (e.g., v1.0.0)'
        required: true
        type: string

permissions: {}

jobs:
  build:
    timeout-minutes: 30
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
          - target: darwin-amd64
            runner: macos-15-intel
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: linux-amd64
            runner: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="${INPUT_TAG}"
          else
            TAG="${REF_NAME}"
          fi
          case "$TAG" in
            v*) ;;
            *) TAG="v${TAG}" ;;
          esac
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[serve,binary]"

      - name: Build binary
        env:
          OCTOMIL_VERSION: ${{ steps.tag.outputs.version }}
        run: ./scripts/build-binary.sh

      - name: Verify binary
        run: |
          ./dist/octomil/octomil --version
          ./dist/octomil/octomil --help
          echo "Binary size: $(du -sh dist/octomil/ | cut -f1)"
          ./dist/octomil/octomil serve --help

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: octomil-${{ matrix.target }}
          path: |
            dist/octomil-${{ steps.tag.outputs.version }}-${{ matrix.target }}.tar.gz
            dist/octomil-${{ steps.tag.outputs.version }}-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 5

  release:
    timeout-minutes: 15
    name: Upload to GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="${INPUT_TAG}"
          else
            TAG="${REF_NAME}"
          fi
          case "$TAG" in
            v*) ;;
            *) TAG="v${TAG}" ;;
          esac
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Generate combined checksums
        run: |
          cd artifacts
          cat *.sha256 | sort -k2 > SHA256SUMS
          cp SHA256SUMS checksums.txt
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          gh release upload "${VERSION}" artifacts/*.tar.gz artifacts/*.sha256 artifacts/SHA256SUMS artifacts/checksums.txt \
            --clobber \
            --repo "${GITHUB_REPOSITORY}" || \
          echo "WARNING: Could not upload to release ${VERSION}. It may not exist yet."

  update-homebrew:
    timeout-minutes: 15
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="${INPUT_TAG}"
          else
            TAG="${REF_NAME}"
          fi
          case "$TAG" in
            v*) ;;
            *) TAG="v${TAG}" ;;
          esac
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download SHA256 files from release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p shas
          gh release download "$TAG" \
            --repo octomil/octomil-python \
            --pattern "SHA256SUMS" \
            --dir shas

          sha_for() {
            awk -v name="$1" '$2 == name { print $1 }' shas/SHA256SUMS
          }

          echo "SHA_DARWIN_ARM64=$(sha_for "octomil-${TAG}-darwin-arm64.tar.gz")" >> "$GITHUB_ENV"
          echo "SHA_DARWIN_AMD64=$(sha_for "octomil-${TAG}-darwin-amd64.tar.gz")" >> "$GITHUB_ENV"
          echo "SHA_LINUX_ARM64=$(sha_for "octomil-${TAG}-linux-arm64.tar.gz")" >> "$GITHUB_ENV"
          echo "SHA_LINUX_AMD64=$(sha_for "octomil-${TAG}-linux-amd64.tar.gz")" >> "$GITHUB_ENV"

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.VERSION_BOT_APP_ID }}
          private-key: ${{ secrets.VERSION_BOT_PRIVATE_KEY }}
          owner: octomil
          repositories: homebrew-octomil

      - name: Checkout homebrew tap
        uses: actions/checkout@v6
        with:
          repository: octomil/homebrew-octomil
          token: ${{ steps.app-token.outputs.token }}

      - name: Update formula
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" Formula/octomil.rb
          sed -i "/darwin-arm64/{ n; s/sha256 \"[^\"]*\"/sha256 \"${SHA_DARWIN_ARM64}\"/; }" Formula/octomil.rb
          sed -i "/darwin-amd64/{ n; s/sha256 \"[^\"]*\"/sha256 \"${SHA_DARWIN_AMD64}\"/; }" Formula/octomil.rb
          sed -i "/linux-arm64/{ n; s/sha256 \"[^\"]*\"/sha256 \"${SHA_LINUX_ARM64}\"/; }" Formula/octomil.rb
          sed -i "/linux-amd64/{ n; s/sha256 \"[^\"]*\"/sha256 \"${SHA_LINUX_AMD64}\"/; }" Formula/octomil.rb
          echo "=== Updated formula ==="
          cat Formula/octomil.rb

      - name: Commit and push
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          git config user.name "octomil-version-bot[bot]"
          git config user.email "octomil-version-bot[bot]@users.noreply.github.com"
          git add Formula/octomil.rb
          git diff --cached --quiet && echo "No changes to formula" || \
            (git commit -m "octomil ${VERSION}" && git push)
