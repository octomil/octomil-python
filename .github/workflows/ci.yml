name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      # 3.12 dropped from the per-PR matrix to halve runner cost; the
      # interesting axes today are the lowest supported version (3.9 —
      # the embedded / Ren'Py / PyInstaller floor) and the most-used
      # production version (3.11). 3.12 still runs in nightly /
      # release workflows.
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          # Pip cache is keyed off pyproject.toml by default and
          # survives across runs of the same Python version, so the
          # ~300 MiB of test-extra wheels (torch CPU, sherpa-onnx,
          # pandas, etc.) only download on dependency changes.
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[test]"

      - name: Run tests with coverage
        # ``-n auto`` runs the suite across all available CPU cores
        # via pytest-xdist. ``--dist=loadfile`` keeps a test file's
        # tests on the same worker so module-level fixtures (notably
        # ``OCTOMIL_CACHE_DIR`` / monkeypatched env vars) don't
        # cross-contaminate. ``pytest-cov`` natively combines
        # per-worker coverage, so the XML report stays accurate.
        run: pytest -n auto --dist=loadfile --cov=octomil --cov-report=xml --cov-report=term-missing

      - name: Verify wheel facade export
        if: matrix.python-version == '3.11'
        run: scripts/check-wheel-facade-export.sh

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 1

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          file: ./coverage.xml
          flags: python
          name: python-${{ matrix.python-version }}
          token: ${{ secrets.CODECOV_TOKEN }}

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
        with:
          name: coverage-report

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip install -e .
          # CVE-2026-3219 is reported against the runner's pip toolchain with
          # no fixed version published yet; keep auditing project dependencies.
          pip-audit --ignore-vuln CVE-2026-3219
