name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    # Bumped from 25 → 40 alongside the `-n 2` parallelism reduction.
    # Halving worker count roughly 1.5–2x the wall-clock; the original
    # 25-min ceiling was already close to what the suite hit at -n auto,
    # and the diagnostic dmesg post-step needs to run AFTER the test
    # step before any job-level timeout. Both reviewers in PR R1
    # flagged this as the most likely self-inflicted failure mode.
    timeout-minutes: 40
    permissions:
      contents: read
    strategy:
      fail-fast: false
      # 3.9 temporarily dropped from the per-PR matrix while investigating
      # a 6-hour hang in the 3.9 leg that was burning Actions minutes across
      # every Dependabot PR. Re-enable once the hang is rooted out.
      # Keep 3.11 (production version) on PRs; 3.9 / 3.12 should run in
      # release / nightly workflows.
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          # Pip cache is keyed off pyproject.toml by default and
          # survives across runs of the same Python version, so the
          # ~300 MiB of test-extra wheels (torch CPU, sherpa-onnx,
          # pandas, etc.) only download on dependency changes.
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[test]"

      - name: Run tests with coverage
        # ``-n 2`` matches GitHub Actions ubuntu-latest's 2-core
        # allocation. ``-n auto`` was picking 4 logical workers via
        # SMT, then 4 × (torch + sherpa-onnx + bench harness scratch)
        # was OOM-killing workers around the 84% mark — manifesting as
        # ``[gw1] node down: Not properly terminated`` and a 25-min
        # job timeout because xdist transparently restarted workers
        # and the test process never returned cleanly.
        #
        # ``--dist=loadfile`` keeps a test file's tests on the same
        # worker so module-level fixtures (notably
        # ``OCTOMIL_CACHE_DIR`` / monkeypatched env vars) don't
        # cross-contaminate.
        #
        # ``--max-worker-restart=0`` is the diagnostic guard: if a
        # worker dies, fail the suite immediately with the offending
        # test name in the log instead of silently restarting and
        # hanging until the job timeout. Triage PRs read the log to
        # identify the killer test; if it's a memory hog, the fix is
        # ``@pytest.mark.serial`` + a comment; if it's a real bug,
        # the fix is fixing the bug.
        #
        # ``pytest-cov`` natively combines per-worker coverage, so the
        # XML report stays accurate.
        run: |
          pytest \
            -n 2 \
            --dist=loadfile \
            --max-worker-restart=0 \
            -v --tb=short \
            --cov=octomil \
            --cov-report=xml \
            --cov-report=term-missing
        # `-v --tb=short`: when --max-worker-restart=0 fails the run
        # on a worker death, xdist's `node down` message names the
        # worker (gw0/gw1) but not the last-started test. With -v the
        # last test name in the log IS the killer. Cost: ~2x larger
        # log; benefit: triage in seconds.

      - name: Collect dmesg on failure (OOM-kill detection)
        # If the worker death was caused by the Linux OOM-killer,
        # the kernel ring buffer records it. Surface those lines in
        # the CI log so triage PRs can confirm OOM vs. SIGSEGV vs.
        # other signal causes without having to reproduce locally.
        if: failure()
        run: |
          # GH-Actions ubuntu-latest currently allows passwordless
          # sudo for the runner user; if that ever changes, surface
          # the policy change cleanly rather than masking the original
          # CI failure with a sudo error.
          if ! sudo --non-interactive true 2>/dev/null; then
            echo "passwordless sudo unavailable on this runner; skipping dmesg diagnostic"
            exit 0
          fi
          echo "=== dmesg (last 200 lines) ==="
          sudo dmesg --ctime | tail -n 200 || true
          echo "=== OOM events ==="
          sudo dmesg --ctime | grep -iE "killed process|out of memory|oom-killer" || echo "no OOM events recorded"

      - name: Verify wheel facade export
        if: matrix.python-version == '3.11'
        run: scripts/check-wheel-facade-export.sh

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 1

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5
        with:
          file: ./coverage.xml
          flags: python
          name: python-${{ matrix.python-version }}
          token: ${{ secrets.CODECOV_TOKEN }}

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: coverage-report

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Run pip-audit
        run: |
          # CVE-2026-6357 affects the runner's pip toolchain; fixed in 26.1.
          python -m pip install --upgrade 'pip>=26.1'
          pip install pip-audit
          pip install -e .
          # CVE-2026-3219 is reported against the runner's pip toolchain with
          # no fixed version published yet; keep auditing project dependencies.
          pip-audit --ignore-vuln CVE-2026-3219
