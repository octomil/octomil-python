name: Architecture Boundaries

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate contracts read token
        id: contracts-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.VERSION_BOT_APP_ID }}
          private-key: ${{ secrets.VERSION_BOT_PRIVATE_KEY }}
          owner: octomil
          repositories: octomil-contracts

      - uses: actions/checkout@v4
        with:
          repository: octomil/octomil-contracts
          ref: v1.22.0
          path: .contract
          token: ${{ steps.contracts-token.outputs.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Check architecture boundaries
        run: python .contract/ci/check_boundaries.py --repo .
