name: Architecture Boundaries

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: octomil/octomil-contracts
          ref: v1.16.0
          path: .contract

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Check architecture boundaries
        run: python .contract/ci/check_boundaries.py --repo .
