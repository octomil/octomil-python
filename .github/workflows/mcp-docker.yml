name: Build MCP Docker Image

on:
  push:
    branches: [main]
    paths:
      - "octomil/mcp/**"
      - "octomil/commands/mcp_cmd.py"
      - "packaging/Dockerfile.mcp"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: octomil/octomil-mcp

jobs:
  build-and-push:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packaging/Dockerfile.mcp
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
