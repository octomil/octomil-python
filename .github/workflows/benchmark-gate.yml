name: Benchmark Regression Gate

on:
  pull_request:
    branches: [main]
    # B5 (URGENT): include cache-bench proof artifacts, the harness tests,
    # the validator, and the workflow file itself so changes to any of
    # these trigger the cache bench proof gate. Without these paths a PR
    # could land a malformed proof artifact (or weaken the gate itself)
    # and the gate would never run.
    paths:
      - 'octomil/**'
      - 'scripts/run_benchmark.py'
      - 'benchmarks/**'
      - 'release/cache_proofs/**'
      - 'tests/test_cache_bench_harness.py'
      - 'ci/validate_cache_bench_proof.py'
      - '.github/workflows/benchmark-gate.yml'
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      update_baseline:
        description: 'Update baseline after successful run'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  benchmark:
    timeout-minutes: 15
    name: TTFT Regression Check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[serve]"

      - name: Run benchmark
        id: bench
        run: |
          python scripts/run_benchmark.py \
            --iterations 30 \
            --warmup 5 \
            --threshold 0.15 \
            --json \
            2>&1 | tee benchmark-output.txt

          # Capture exit code
          BENCH_EXIT=${PIPESTATUS[0]}
          echo "exit_code=${BENCH_EXIT}" >> "$GITHUB_OUTPUT"

          # Extract TTFT p95 from output for PR comment
          TTFT_P95=$(grep -m1 'TTFT p95:' benchmark-output.txt | awk '{print $3}' | tr -d 'ms')
          echo "ttft_p95=${TTFT_P95}" >> "$GITHUB_OUTPUT"

          exit $BENCH_EXIT

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('benchmark-output.txt', 'utf8');
            const passed = '${{ steps.bench.outputs.exit_code }}' === '0';
            const icon = passed ? ':white_check_mark:' : ':x:';
            const status = passed ? 'PASSED' : 'FAILED';

            const body = `## ${icon} Benchmark Regression Gate ${status}

            \`\`\`
            ${output}
            \`\`\`

            **Threshold:** 15% regression on TTFT p95
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

      - name: Update baseline (release builds)
        if: >
          startsWith(github.ref, 'refs/tags/v') &&
          steps.bench.outputs.exit_code == '0'
        run: |
          python scripts/run_benchmark.py \
            --iterations 30 \
            --warmup 5 \
            --update-baseline

      - name: Update baseline (manual trigger)
        if: >
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.update_baseline == 'true' &&
          steps.bench.outputs.exit_code == '0'
        run: |
          python scripts/run_benchmark.py \
            --iterations 30 \
            --warmup 5 \
            --update-baseline

      - name: Commit updated baseline
        if: >
          (startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.update_baseline == 'true')) &&
          steps.bench.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/baseline.json
          if git diff --cached --quiet; then
            echo "No baseline changes to commit."
            exit 0
          fi

          safe_ref="${GITHUB_REF_NAME//\//-}"
          branch="automation/bench-baseline-${safe_ref}-${GITHUB_RUN_ID}"
          title="chore(bench): update baseline after ${GITHUB_REF_NAME}"

          git switch -c "$branch"
          git commit -m "$title"
          git push origin "HEAD:$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "$title" \
            --body "Automated benchmark baseline update from ${GITHUB_REF_NAME}."

  # ── Cache bench proof gate (Lane H skeleton) ──────────────────────────────
  # Runs the Python-side cache bench harness tests:
  #   1. test_cache_bench_harness.py: unit + integration tests for the harness.
  #   2. Verifies the anti-pattern guard: absent fixture dir → skipped proof.
  #   3. Verifies the CI latch: if any cache_bench_proof artifact in
  #      release/cache_proofs/ has skipped=false, it must be valid.
  #
  # Phase 1: no cache claims latency yet; the latency-claim gate is wired but
  # has no active claims to fail on.
  #
  # Cross-ref (Lane A canonical telemetry enum):
  #   cold_p50/p95_ms / warm_p50/p95_ms = p50/p95 of cache.lookup_ms (gauge)
  #     during the cold/warm phase respectively.
  #   hit_ratio = cache.hit_total / (cache.hit_total + cache.miss_total).
  # These are aggregate proof-artifact fields (cache_bench_proof.json), not raw
  # metric enum entries. Per-sample raw metrics come from runtime_metric.json.
  cache-bench-proof-gate:
    timeout-minutes: 15
    name: Cache Bench Proof Gate (Python — Lane H skeleton)
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install pytest jsonschema

      - name: Run cache bench harness tests
        run: pytest tests/test_cache_bench_harness.py -v -o addopts=''

      - name: Verify anti-pattern guard (no fixture → skipped proof)
        run: |
          python3 -c "
          import json, os, sys, tempfile
          from pathlib import Path
          from octomil.runtime.bench.cache_bench import (
              CacheBenchConfig, run_cache_bench, SKIP_STAGED_ARTIFACT_ABSENT
          )
          with tempfile.TemporaryDirectory() as output_dir:
              config = CacheBenchConfig(
                  cache_id='chat.completion.kv',
                  capability='chat.completion',
                  fixture_dir=Path('/nonexistent/does/not/exist'),
                  output_dir=Path(output_dir),
              )
              proof = run_cache_bench(config)
              if not proof.skipped:
                  print('FAIL: harness ran a live measurement when fixture dir was absent — first-request-synthesis anti-pattern!')
                  sys.exit(1)
              if proof.skip_reason != SKIP_STAGED_ARTIFACT_ABSENT:
                  print(f'FAIL: expected skip_reason={SKIP_STAGED_ARTIFACT_ABSENT!r}, got {proof.skip_reason!r}')
                  sys.exit(1)
              proof_path = Path(output_dir) / 'chat.completion.kv_proof.json'
              if not proof_path.exists():
                  print('FAIL: skipped proof was not written to disk')
                  sys.exit(1)
              doc = json.loads(proof_path.read_text())
              metrics = ['cold_p50_ms','cold_p95_ms','warm_p50_ms','warm_p95_ms','hit_ratio']
              for m in metrics:
                  if doc.get(m) is not None:
                      print(f'FAIL: {m} must be null when skipped=True, got {doc[m]}')
                      sys.exit(1)
              print(f'OK: anti-pattern guard works — skipped proof emitted correctly.')
          "

      - name: Latency-claim gate (canonical schema validation)
        # Codex sweep B4 (URGENT): every proof artifact in
        # release/cache_proofs/** is run through the canonical validator
        # — both skipped=true and skipped=false. The previous gate only
        # ad-hoc-checked cold_p50_ms / hit_ratio for skipped=false and
        # let schema-invalid / privacy-violating artifacts through.
        run: |
          python3 -c "
          import json, pathlib, sys
          sys.path.insert(0, 'scripts')
          from validate_cache_bench_proof import validate_proof, ProofValidationError
          proof_dir = pathlib.Path('release/cache_proofs')
          if not proof_dir.exists():
              print('No release/cache_proofs/ — Phase 1 gate: wired, no claims yet.')
              sys.exit(0)
          failures = []
          checked = 0
          for f in sorted(proof_dir.glob('**/*.json')):
              checked += 1
              try:
                  doc = json.loads(f.read_text())
              except json.JSONDecodeError as e:
                  failures.append(f'{f}: JSON decode error: {e}')
                  continue
              try:
                  validate_proof(doc)
              except ProofValidationError as exc:
                  failures.append(f'{f}: {exc}')
          if failures:
              for msg in failures:
                  print(f'FAIL: {msg}')
              sys.exit(1)
          print(f'Cache bench proof gate: OK ({checked} artifact(s) validated).')
          "

      - name: Upload proof artifacts (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-cache-bench-proofs-${{ github.run_id }}
          path: release/cache_proofs/
          if-no-files-found: ignore
          retention-days: 14
