name: Nightly Floor (3.9)

# Bounded nightly run that exercises the lowest supported Python (3.9 —
# the embedded / Ren'Py / PyInstaller floor that ``requires-python = ">=3.9"``
# in pyproject.toml claims to support).
#
# Per-PR CI dropped 3.9 from its matrix while a multi-hour 3.9 hang is
# investigated (see strategy/cleanup/python-39-hang-investigation-2026-05-02.md
# in the workspace repo). This nightly job preserves coverage with strict
# guard rails so any regression surfaces within an hour at most.
#
# Strict bounds:
# - timeout-minutes: 60 on the job (10x the typical 3.11 wall time)
# - fail-fast: true so a hang doesn't block subsequent attempts
# - --timeout=120 if pytest-timeout is available (added with the
#   companion follow-up); otherwise the job-level fence still applies.

on:
  schedule:
    # Daily at 04:00 UTC. Aligns with quiet hours, well after PR-CI peak.
    - cron: "0 4 * * *"
  workflow_dispatch: {}

concurrency:
  group: nightly-floor-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  floor-test:
    name: Test Python 3.9 (floor)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.9
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.9"
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[test]"
          # pytest-timeout is the structural fix; install it here even
          # if not yet in pyproject so the floor job can use --timeout.
          pip install "pytest-timeout>=2.3.0"

      - name: Run tests with per-test timeout
        # ``--timeout=120 --timeout-method=thread`` surfaces any hung
        # individual test instead of letting it consume the 60-min job
        # ceiling. Combined with the job timeout, a regression caps
        # at most one nightly cycle of waste.
        run: |
          pytest -n auto --dist=loadfile \
            --timeout=120 --timeout-method=thread \
            --cov=octomil --cov-report=term-missing
